<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Morgan Admin</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f8f1e7;
    padding:40px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 18px #c9b8a2;
}

input,textarea,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

textarea{
    height:100px;
}

button{
    background:#7b1e1e;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

.product img{
    width:200px;
    height:130px;
    object-fit:cover;
    border-radius:8px;
}

.edit-btn{
    background:#d4a017;
}

.delete-btn{
    background:#b3261e;
}
</style>
</head>

<body>

<div class="box">

<h1>Morgan Product Admin</h1>

<input type="hidden" id="productId">

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<textarea id="description" placeholder="Description"></textarea>

<input id="image_url" placeholder="Image URL">

<button onclick="saveProduct()">Save Product</button>

<button onclick="clearForm()">Clear</button>

<p id="message"></p>

<hr>

<h2>Products</h2>

<div id="productList">Loading...</div>

</div>

<script>
const SUPABASE_URL =
"https://omcytrhftuivfzbwcalp.supabase.co";

const SUPABASE_KEY =
"你的 sb_publishable 开头那串";

function clearForm(){
    document.getElementById("productId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("description").value = "";
    document.getElementById("image_url").value = "";
}

async function loadProducts(){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const products = await response.json();
    const productList = document.getElementById("productList");
    productList.innerHTML = "";

    products.forEach(product=>{
        productList.innerHTML += `
            <div class="product">
                <img src="${product.image_url}">
                <h3>${product.name}</h3>
                <p>${product.description}</p>
                <p><strong>$${product.price}</strong></p>

                <button class="edit-btn" onclick="editProduct(${product.id})">
                    Edit
                </button>

                <button class="delete-btn" onclick="deleteProduct(${product.id})">
                    Delete
                </button>
            </div>
        `;
    });
}

async function saveProduct(){
    const id = document.getElementById("productId").value;

    const product = {
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        description: document.getElementById("description").value,
        image_url: document.getElementById("image_url").value
    };

    let url = `${SUPABASE_URL}/rest/v1/products`;
    let method = "POST";

    if(id){
        url = `${SUPABASE_URL}/rest/v1/products?id=eq.${id}`;
        method = "PATCH";
    }

    const response = await fetch(url,{
        method:method,
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`,
            "Content-Type":"application/json",
            "Prefer":"return=representation"
        },
        body:JSON.stringify(product)
    });

    if(response.ok){
        document.getElementById("message").innerText =
        id ? "Product updated successfully!" : "Product saved successfully!";

        clearForm();
        loadProducts();
    }else{
        document.getElementById("message").innerText =
        "Save failed. Check Supabase policy.";
    }
}

async function editProduct(id){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?id=eq.${id}&select=*`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await response.json();
    const product = data[0];

    document.getElementById("productId").value = product.id;
    document.getElementById("name").value = product.name;
    document.getElementById("price").value = product.price;
    document.getElementById("description").value = product.description;
    document.getElementById("image_url").value = product.image_url;

    window.scrollTo(0,0);
}

async function deleteProduct(id){
    if(!confirm("Delete this product?")) return;

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?id=eq.${id}`,
        {
            method:"DELETE",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    if(response.ok){
        loadProducts();
    }else{
        alert("Delete failed. Check DELETE policy.");
    }
}

loadProducts();
</script>

</body>
</html>
