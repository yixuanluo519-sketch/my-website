<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Morgan Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0b0b;
    color:white;
}

header{
    background:#050505;
    border-bottom:1px solid #d4af37;
    padding:20px 40px;
    color:#d4af37;
    font-size:26px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:35px 20px;
}

.box{
    background:#151515;
    border:1px solid #333;
    border-radius:16px;
    padding:25px;
    margin-bottom:25px;
}

input,textarea,select,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
    border-radius:8px;
    border:1px solid #333;
}

input,textarea,select{
    background:#0f0f0f;
    color:white;
}

button{
    background:#d4af37;
    color:black;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

.delete-btn{
    background:#b3261e;
    color:white;
}

.edit-btn{
    background:#d4af37;
    color:black;
}

.clear-btn{
    background:#666;
    color:white;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.stat{
    background:#111;
    border:1px solid #d4af37;
    border-radius:14px;
    padding:25px;
    text-align:center;
}

.stat h2{
    color:#d4af37;
    font-size:36px;
}

.product{
    display:grid;
    grid-template-columns:130px 1fr;
    gap:18px;
    border:1px solid #333;
    border-radius:12px;
    padding:15px;
    margin:15px 0;
    background:#111;
}

.product img{
    width:130px;
    height:100px;
    object-fit:cover;
    border-radius:8px;
}

.quote{
    border:1px solid #333;
    border-radius:12px;
    padding:15px;
    margin:12px 0;
    background:#111;
}

.badge{
    display:inline-block;
    background:#d4af37;
    color:black;
    padding:4px 10px;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}

.hidden{
    display:none;
}

h2{
    color:#d4af37;
}

@media(max-width:700px){
    .product{
        grid-template-columns:1fr;
    }

    .product img{
        width:100%;
        height:180px;
    }
}
</style>
</head>

<body>

<header>
Morgan Admin Dashboard
</header>

<div class="container">

<div class="box" id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="password" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<div id="adminBox" class="hidden">

<div class="dashboard">

<div class="stat">
<h2 id="productCount">0</h2>
<p>Total Products</p>
</div>

<div class="stat">
<h2 id="quoteCount">0</h2>
<p>Total Quotes</p>
</div>

<div class="stat">
<h2 id="featuredCount">0</h2>
<p>Best Sellers</p>
</div>

</div>

<div class="box">
<h2>Add / Edit Product</h2>

<input type="hidden" id="productId">

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<textarea id="description" placeholder="Description"></textarea>
<input id="image_url" placeholder="Image URL">

<select id="category">
<option value="">Select Category</option>
<option value="Meat Processing">Meat Processing</option>
<option value="Sausage Equipment">Sausage Equipment</option>
<option value="Vegetable Processing">Vegetable Processing</option>
<option value="Smokers & Warmers">Smokers & Warmers</option>
<option value="Kitchen Equipment">Kitchen Equipment</option>
<option value="Parts & Accessories">Parts & Accessories</option>
</select>

<select id="featured">
<option value="false">Not Best Seller</option>
<option value="true">Best Seller</option>
</select>

<button onclick="saveProduct()">Save Product</button>
<button class="clear-btn" onclick="clearForm()">Clear Form</button>

<p id="message"></p>
</div>

<div class="box">
<h2>Recent Quote Requests</h2>
<div id="quoteList">Loading...</div>
</div>

<div class="box">
<h2>Product List</h2>
<div id="productList">Loading...</div>
</div>

</div>

</div>

<script>
const ADMIN_PASSWORD = "morgan123";

const SUPABASE_URL = "https://omcytrhftuivfzbwcalp.supabase.co";
const SUPABASE_KEY = "sb_publishable_XpUZl3GZyhSQ9-NR4xFzbw_Kf5pU_cQ";

function login(){
    const password = document.getElementById("password").value;

    if(password === ADMIN_PASSWORD){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminBox").classList.remove("hidden");
        loadDashboard();
    }else{
        alert("Wrong password");
    }
}

function clearForm(){
    document.getElementById("productId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("description").value = "";
    document.getElementById("image_url").value = "";
    document.getElementById("category").value = "";
    document.getElementById("featured").value = "false";
    document.getElementById("message").innerText = "";
}

async function loadDashboard(){
    await loadProducts();
    await loadQuotes();
}

async function loadProducts(){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?select=*&order=id.desc`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const products = await response.json();

    document.getElementById("productCount").innerText = products.length;
    document.getElementById("featuredCount").innerText =
    products.filter(p => p.featured === true).length;

    const list = document.getElementById("productList");
    list.innerHTML = "";

    products.slice(0,80).forEach(product=>{
        list.innerHTML += `
        <div class="product">
            <img src="${product.image_url}">
            <div>
                <h3>${product.name}</h3>
                <p>${product.description || ""}</p>
                <p><strong>$${product.price}</strong></p>
                <p><span class="badge">${product.category || "No Category"}</span></p>
                <p>${product.featured ? "⭐ Best Seller" : ""}</p>

                <button class="edit-btn" onclick="editProduct(${product.id})">
                    Edit
                </button>

                <button class="delete-btn" onclick="deleteProduct(${product.id})">
                    Delete
                </button>
            </div>
        </div>
        `;
    });
}

async function loadQuotes(){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/quotes?select=*&order=id.desc&limit=50`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const quotes = await response.json();

    document.getElementById("quoteCount").innerText = quotes.length;

    const box = document.getElementById("quoteList");
    box.innerHTML = "";

    if(!quotes || quotes.length === 0){
        box.innerHTML = "<p>No quotes yet.</p>";
        return;
    }

    quotes.forEach(q=>{
        box.innerHTML += `
        <div class="quote">
            <h3>${q.name || "No Name"}</h3>

            <p><strong>Status:</strong>
            <span class="badge">${q.status || "New"}</span>
            </p>

            <p><strong>Email:</strong> ${q.email || ""}</p>
            <p><strong>Phone:</strong> ${q.phone || ""}</p>
            <p><strong>Company:</strong> ${q.company || ""}</p>
            <p><strong>Product:</strong> ${q.product_name || ""}</p>
            <p>${q.message || ""}</p>

            <button onclick="markContacted(${q.id})">
                Mark Contacted
            </button>

            <button class="delete-btn" onclick="deleteQuote(${q.id})">
                Delete Quote
            </button>
        </div>
        `;
    });
}

async function markContacted(id){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}`,
        {
            method:"PATCH",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                status:"Contacted"
            })
        }
    );

    if(response.ok){
        loadQuotes();
    }else{
        alert("Failed to update quote status.");
    }
}

async function deleteQuote(id){
    if(!confirm("Delete this quote?")) return;

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}`,
        {
            method:"DELETE",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    if(response.ok){
        loadQuotes();
    }else{
        alert("Delete quote failed.");
    }
}

async function saveProduct(){
    const id = document.getElementById("productId").value;

    const product = {
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        description: document.getElementById("description").value,
        image_url: document.getElementById("image_url").value,
        category: document.getElementById("category").value,
        featured: document.getElementById("featured").value === "true"
    };

    let url = `${SUPABASE_URL}/rest/v1/products`;
    let method = "POST";

    if(id){
        url = `${SUPABASE_URL}/rest/v1/products?id=eq.${id}`;
        method = "PATCH";
    }

    const response = await fetch(url,{
        method:method,
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`,
            "Content-Type":"application/json",
            "Prefer":"return=representation"
        },
        body:JSON.stringify(product)
    });

    if(response.ok){
        document.getElementById("message").innerText =
        id ? "Product updated successfully!" : "Product saved successfully!";

        clearForm();
        loadProducts();
    }else{
        document.getElementById("message").innerText =
        "Save failed. Check policies or fields.";
    }
}

async function editProduct(id){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?id=eq.${id}&select=*`,
        {
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await response.json();
    const product = data[0];

    document.getElementById("productId").value = product.id;
    document.getElementById("name").value = product.name || "";
    document.getElementById("price").value = product.price || "";
    document.getElementById("description").value = product.description || "";
    document.getElementById("image_url").value = product.image_url || "";
    document.getElementById("category").value = product.category || "";
    document.getElementById("featured").value = product.featured ? "true" : "false";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

async function deleteProduct(id){
    if(!confirm("Delete this product?")) return;

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?id=eq.${id}`,
        {
            method:"DELETE",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    if(response.ok){
        loadProducts();
    }else{
        alert("Delete failed.");
    }
}
</script>

</body>
</html>
