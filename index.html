<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Morgan Food Machinery</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f8f5ef;
}

header{
background:#8b0000;
color:white;
padding:25px;
text-align:center;
}

.hero{
padding:80px 20px;
text-align:center;
background:#d9b36c;
color:white;
}

.hero h1{
font-size:50px;
}

.products{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
font-size:24px;
color:#8b0000;
font-weight:bold;
}

footer{
background:#222;
color:white;
padding:30px;
text-align:center;
margin-top:50px;
}

</style>
</head>

<body>

<header>
<h1>Morgan Food Machinery</h1>
<p>Commercial Kitchen Equipment Supplier</p>
</header>

<section class="hero">
<h1>Morgan</h1>
<p>Professional Food Machinery & Kitchen Equipment</p>
</section>

<section class="products" id="products"></section>

<footer>

<h3>Contact Us</h3>

<p>sales@morgangastros.com</p>

<p>313-899-9696</p>

<p>
3231 S Gulley Rd. STE B<br>
Dearborn, MI 48124 USA
</p>

</footer>

<script>

const SUPABASE_URL =
'https://omcytrhftuivfzbwcalp.supabase.co';

const SUPABASE_KEY =
'sb_publishable_XpUZl3GZyhSQ9-NR4xFzbw_Kf5pU_cQ';

async function loadProducts(){

const res = await fetch(
`${SUPABASE_URL}/rest/v1/products?select=*`,
{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
}
);

const products = await res.json();

const container =
document.getElementById('products');

container.innerHTML='';

products.forEach(product=>{

container.innerHTML += `
<div class="card">

<img src="${product.image_url}">

<div class="card-body">

<h2>${product.name}</h2>

<p>${product.description}</p>

<div class="price">
$${product.price}
</div>

</div>

</div>
`;

});

}

loadProducts();

</script>

</body>
</html>
