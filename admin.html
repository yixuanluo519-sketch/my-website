<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Morgan Admin</title>

<style>
body{
    font-family:Arial;
    background:#f8f1e7;
    padding:40px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 18px #c9b8a2;
}

input,textarea,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    background:#7b1e1e;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.product{
    border:1px solid #ddd;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

.product img{
    width:180px;
    height:120px;
    object-fit:cover;
    border-radius:8px;
}

.delete-btn{
    background:#b3261e;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
</div>

<div class="box" id="adminBox" style="display:none;">

    <h2>Add Product</h2>

    <input id="name" placeholder="Product name">
    <input id="price" placeholder="Price">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="image_url" placeholder="Image URL">

    <button onclick="addProduct()">Save Product</button>

    <p id="message"></p>

    <hr>

    <h2>Product List</h2>
    <div id="productList">Loading...</div>

</div>

<script>
const ADMIN_PASSWORD = "morgan123";

const SUPABASE_URL = "https://omcytrhftuivfzbwcalp.supabase.co";
const SUPABASE_KEY = "sb_publishable_XpUZl3GZyhSQ9-NR4xFzbw_Kf5pU_cQ";

function login(){
    const password = document.getElementById("password").value;

    if(password === ADMIN_PASSWORD){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminBox").style.display = "block";
        loadProducts();
    }else{
        alert("Wrong password");
    }
}

async function addProduct(){
    const product = {
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        description: document.getElementById("description").value,
        image_url: document.getElementById("image_url").value
    };

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products`,
        {
            method:"POST",
            headers:{
                apikey: SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`,
                "Content-Type":"application/json",
                "Prefer":"return=representation"
            },
            body: JSON.stringify(product)
        }
    );

    if(response.ok){
        document.getElementById("message").innerText =
        "Product saved successfully!";

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        document.getElementById("image_url").value = "";

        loadProducts();
    }else{
        document.getElementById("message").innerText =
        "Failed to save product.";
    }
}

async function loadProducts(){
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?select=*&order=id.asc`,
        {
            headers:{
                apikey: SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const products = await response.json();
    const productList = document.getElementById("productList");

    productList.innerHTML = "";

    if(products.length === 0){
        productList.innerHTML = "<p>No products yet.</p>";
        return;
    }

    products.forEach(product => {
        productList.innerHTML += `
            <div class="product">
                <img src="${product.image_url}">
                <h3>${product.name}</h3>
                <p>${product.description}</p>
                <p><strong>$${product.price}</strong></p>

                <button class="delete-btn" onclick="deleteProduct(${product.id})">
                    Delete
                </button>
            </div>
        `;
    });
}

async function deleteProduct(id){
    if(!confirm("Delete this product?")){
        return;
    }

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/products?id=eq.${id}`,
        {
            method:"DELETE",
            headers:{
                apikey: SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`
            }
        }
    );

    if(response.ok){
        document.getElementById("message").innerText =
        "Product deleted successfully!";
        loadProducts();
    }else{
        document.getElementById("message").innerText =
        "Failed to delete product.";
    }
}
</script>

</body>
</html>
