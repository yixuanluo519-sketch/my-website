<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Category</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0b0b;
color:white;
}

header{
background:#050505;
border-bottom:1px solid #d4af37;
padding:20px 50px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#d4af37;
}

.container{
padding:50px;
}

h1{
color:#d4af37;
text-align:center;
margin-bottom:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#161616;
border:1px solid #333;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.price{
color:#d4af37;
font-size:22px;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#d4af37;
color:black;
text-decoration:none;
border-radius:25px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<div class="logo">
Morgan Food Machinery
</div>
</header>

<div class="container">

<h1 id="title">
Loading Category...
</h1>

<div class="products" id="productList">

Loading...

</div>

</div>

<script>

const SUPABASE_URL =
"https://omcytrhftuivfzbwcalp.supabase.co";

const SUPABASE_KEY =
"sb_publishable_XpUZl3GZyhSQ9-NR4xFzbw_Kf5pU_cQ";

const params =
new URLSearchParams(window.location.search);

const category =
params.get("category");

document.getElementById("title").innerText =
category;

async function loadProducts(){

const response = await fetch(
`${SUPABASE_URL}/rest/v1/products?category=eq.${encodeURIComponent(category)}&select=*`,
{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`
}
}
);

const products =
await response.json();

const list =
document.getElementById("productList");

if(products.length===0){
list.innerHTML =
"<p>No products found.</p>";
return;
}

list.innerHTML =
products.map(product=>`

<div class="card">

<img src="${product.image_url}">

<div class="card-body">

<h3>${product.name}</h3>

<p>${product.description || ""}</p>

<p class="price">
$${product.price}
</p>

<a class="btn"
href="product.html?id=${product.id}">
View Details
</a>

</div>

</div>

`).join("");

}

loadProducts();

</script>

</body>
</html>
