<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hakka Brothers</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f8f1e7;
    color:#2b1a12;
}

header{
    background:#7b1e1e;
    color:white;
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-weight:bold;
}

.hero{
    background:linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url("https://images.unsplash.com/photo-1556911220-bff31c812dba?w=1400");
    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
    padding:130px 20px;
}

.hero h1{
    font-size:60px;
    margin:0;
}

.hero p{
    font-size:24px;
}

.btn{
    background:#d4a017;
    color:white;
    padding:14px 32px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

.section{
    padding:60px 80px;
    text-align:center;
}

.products{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 18px #c9b8a2;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
}

.about{
    background:white;
    line-height:1.8;
}

.contact{
    background:#fff7ea;
}

footer{
    background:#7b1e1e;
    color:white;
    text-align:center;
    padding:25px;
}
</style>
</head>

<body>

<header>
    <div class="logo">Hakka Brothers</div>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <h1>Hakka Brothers</h1>
    <p>Professional Food Machinery & Kitchen Equipment</p>
    <a class="btn" href="#products">View Products</a>
</section>

<section class="section about" id="about">
    <h2>About Us</h2>
    <p>
        Hakka Brothers specializes in food machinery and kitchen equipment,
        including sausage stuffers, meat processing tools, and practical kitchen supplies.
        We are committed to providing reliable, durable, and easy-to-use products for families,
        restaurants, and small food businesses.
    </p>
</section>

<section class="section" id="products">
    <h2>Our Products</h2>

    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=500">
            <h3>Sausage Stuffer</h3>
            <p>Durable food-grade sausage filling machine for home and commercial use.</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c?w=500">
            <h3>Kitchen Equipment</h3>
            <p>Reliable kitchen tools designed for efficient food preparation.</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=500">
            <h3>Food Processing Tools</h3>
            <p>Practical tools for meat processing, food preparation, and daily kitchen work.</p>
        </div>

    </div>
</section>

<section class="section contact" id="contact">
    <h2>Contact Us</h2>
    <p>Email: contact@hakkabrothers.com</p>
    <p>Phone: +1 000-000-0000</p>
    <p>Location: United States</p>
    <a class="btn" href="mailto:contact@hakkabrothers.com">Send Email</a>
</section>

<footer>
    <p>© 2026 Hakka Brothers. All Rights Reserved.</p>
</footer>

</body>
</html>
